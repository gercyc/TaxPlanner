<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta name="theme-color" content="#0F172A" />

    <meta name="author" content="TaxPlanner" />

    <title>TaxPlanner — Simulador de Imposto de Renda e Blog Tributário</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <div id="app">

            <circle r="40%" cx="50%" cy="50%" />

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <!-- Prism.js core + autoloader for syntax highlighting -->

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
